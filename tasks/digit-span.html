<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digit Span - Working Memory Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .game-container {
            background: rgba(255,255,255,0.95);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sequence-display {
            font-size: 5rem;
            font-weight: bold;
            font-family: monospace;
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 30px;
            letter-spacing: 15px;
        }
        .input-display {
            font-size: 2rem;
            font-family: monospace;
            margin: 20px 0;
            padding: 15px;
            background: #e0e0e0;
            border-radius: 20px;
            letter-spacing: 8px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            min-width: 120px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .number-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .num-key {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border: none;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        .num-key:active { transform: scale(0.95); }
        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .ctrl-btn {
            background: #4a5568;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .ctrl-btn.submit { background: #48bb78; }
        .ctrl-btn.clear { background: #e74c3c; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .completion-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 500px) {
            .sequence-display { font-size: 3rem; letter-spacing: 8px; }
            .num-key { padding: 15px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🔢 Digit Span Test</h1>
    <p>Remember the sequence and enter it in order!</p>
    
    <div class="sequence-display" id="sequenceDisplay">—</div>
    
    <div class="input-display" id="inputDisplay"></div>
    
    <div class="stats">
        <div class="stat-card">
            <div>Level</div>
            <div class="stat-value" id="level">3</div>
        </div>
        <div class="stat-card">
            <div>Errors</div>
            <div class="stat-value" id="errors">0</div>
        </div>
        <div class="stat-card">
            <div>Max Level</div>
            <div class="stat-value" id="maxLevel">0</div>
        </div>
    </div>
    
    <div class="number-pad" id="numberPad"></div>
    
    <div class="control-buttons">
        <button class="ctrl-btn submit" id="submitBtn">✓ Submit</button>
        <button class="ctrl-btn clear" id="clearBtn">⌫ Clear</button>
    </div>
    
    <div class="message" id="message">Ready! Press Start to begin</div>
</div>

<script>
    class DigitSpanTraining {
        constructor() {
            this.sequence = [];
            this.userInput = [];
            this.level = 3;
            this.errors = 0;
            this.maxLevel = 0;
            this.showing = false;
            this.gameActive = false;
            this.completed = false;
            this.errorLimit = 5;
            
            this.init();
        }
        
        init() {
            this.createNumberPad();
            this.setupEventListeners();
            this.startGame();
        }
        
        createNumberPad() {
            const pad = document.getElementById('numberPad');
            pad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const key = document.createElement('button');
                key.className = 'num-key';
                key.textContent = i;
                key.addEventListener('click', () => this.addInput(i));
                pad.appendChild(key);
            }
            const zeroKey = document.createElement('button');
            zeroKey.className = 'num-key';
            zeroKey.textContent = 0;
            zeroKey.addEventListener('click', () => this.addInput(0));
            pad.appendChild(zeroKey);
        }
        
        setupEventListeners() {
            document.getElementById('submitBtn').addEventListener('click', () => this.submitAnswer());
            document.getElementById('clearBtn').addEventListener('click', () => this.clearInput());
            
            window.addEventListener('keydown', (e) => {
                if (this.showing) return;
                if (e.key >= '0' && e.key <= '9') {
                    this.addInput(parseInt(e.key));
                } else if (e.key === 'Enter') {
                    this.submitAnswer();
                } else if (e.key === 'Backspace') {
                    this.clearInput();
                }
            });
        }
        
        startGame() {
            this.gameActive = true;
            this.level = 3;
            this.errors = 0;
            this.maxLevel = 0;
            this.updateUI();
            this.newTrial();
            document.getElementById('message').innerHTML = '🎯 Game started! Watch the sequence carefully!';
            document.getElementById('message').style.background = '#d4edda';
        }
        
        generateSequence(len) {
            let seq = [];
            for (let i = 0; i < len; i++) {
                seq.push(Math.floor(Math.random() * 10));
            }
            return seq;
        }
        
        async showSequence() {
            this.showing = true;
            const display = document.getElementById('sequenceDisplay');
            display.textContent = '';
            
            for (let num of this.sequence) {
                display.textContent = num;
                display.style.transform = 'scale(1.1)';
                await this.sleep(800);
                display.textContent = '';
                display.style.transform = 'scale(1)';
                await this.sleep(300);
            }
            
            this.showing = false;
            document.getElementById('message').innerHTML = 'Now enter the sequence!';
            document.getElementById('message').style.background = '#ffeaa7';
        }
        
        sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        addInput(num) {
            if (this.showing || !this.gameActive) return;
            this.userInput.push(num);
            this.updateInputDisplay();
        }
        
        clearInput() {
            if (this.showing || !this.gameActive) return;
            this.userInput = [];
            this.updateInputDisplay();
        }
        
        updateInputDisplay() {
            document.getElementById('inputDisplay').textContent = this.userInput.join(' ');
        }
        
        async submitAnswer() {
            if (this.showing || !this.gameActive) return;
            
            let isCorrect = true;
            if (this.userInput.length !== this.sequence.length) {
                isCorrect = false;
            } else {
                for (let i = 0; i < this.sequence.length; i++) {
                    if (this.userInput[i] !== this.sequence[i]) {
                        isCorrect = false;
                        break;
                    }
                }
            }
            
            if (isCorrect) {
                // Correct - increase level
                this.level++;
                if (this.level > this.maxLevel) this.maxLevel = this.level;
                document.getElementById('message').innerHTML = '✓ Correct! Next level...';
                document.getElementById('message').style.background = '#d4edda';
                this.updateUI();
                this.newTrial();
            } else {
                // Wrong - increase errors
                this.errors++;
                this.updateUI();
                document.getElementById('message').innerHTML = `❌ Wrong! The sequence was: ${this.sequence.join(' ')}`;
                document.getElementById('message').style.background = '#f8d7da';
                
                if (this.errors >= this.errorLimit) {
                    this.gameOver();
                } else {
                    // Same level, try again
                    setTimeout(() => this.newTrial(), 2000);
                }
            }
        }
        
        newTrial() {
            if (!this.gameActive) return;
            this.sequence = this.generateSequence(this.level);
            this.userInput = [];
            this.updateInputDisplay();
            this.showSequence();
        }
        
        updateUI() {
            document.getElementById('level').textContent = this.level;
            document.getElementById('errors').textContent = `${this.errors}/${this.errorLimit}`;
            document.getElementById('maxLevel').textContent = this.maxLevel;
        }
        
        gameOver() {
            this.gameActive = false;
            document.getElementById('message').innerHTML = `🎮 Game Over! You reached level ${this.maxLevel}`;
            document.getElementById('message').style.background = '#ffeaa7';
            document.getElementById('sequenceDisplay').textContent = '🏆';
            this.completeTraining();
        }
        
        completeTraining() {
            if (this.completed) return;
            this.completed = true;
            
            const banner = document.createElement('div');
            banner.className = 'completion-banner';
            banner.innerHTML = '✅ Digit Span Completed! You can close this window.';
            document.body.appendChild(banner);
            
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('taskId');
            if (window.opener) {
                window.opener.postMessage({ type: 'TASK_COMPLETE', taskId: taskId }, '*');
            }
            setTimeout(() => banner.remove(), 5000);
        }
    }
    
    new DigitSpanTraining();
</script>
</body>
</html>
