<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Feature Search Task - Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a2634 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 1200px;
            width: 100%;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            background: #f0f2f5;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #7f8c8d; }
        .stat-value { font-size: 28px; font-weight: 700; color: #2c3e50; }
        .stat-value.warning { color: #e74c3c; }
        .stat-value.success { color: #2ecc71; }
        .timer-container {
            background: linear-gradient(145deg, #2c3e50, #1e2a3a);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 15px;
        }
        .timer-display {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 10px;
        }
        .difficulty-badge {
            padding: 8px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            background: #48bb78;
            color: white;
        }
        .grid-container {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .grid-wrapper {
            flex: 1;
            min-width: 280px;
            text-align: center;
        }
        .grid-label {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #e9ecef;
            padding: 15px;
            border-radius: 15px;
            aspect-ratio: 1;
        }
        .grid-cell {
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            aspect-ratio: 1;
        }
        .shape {
            width: 80%;
            height: 80%;
        }
        .shape-circle { border-radius: 50%; }
        .shape-square { }
        .shape-triangle {
            width: 0;
            height: 0;
            background: transparent !important;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 35px solid;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 14px 35px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-same { background: #48bb78; color: white; }
        .btn-different { background: #f56565; color: white; }
        .btn-complete { background: #4f7df3; color: white; }
        .btn-reset { background: #718096; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: 500;
        }
        .message-success { background: #f0fff4; color: #22543d; }
        .message-error { background: #fff5f5; color: #742a2a; }
        .message-info { background: #ebf8ff; color: #1e3a8a; }
        .completion-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 750px) {
            .stats-panel { grid-template-columns: repeat(3, 1fr); }
            .timer-display { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🔍 Feature Search Task</h1>
    <div class="subtitle">Treisman & Gelade (1980) - Visual Attention Paradigm</div>

    <div class="stats-panel">
        <div class="stat-item"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-item"><div class="stat-label">Correct</div><div class="stat-value success" id="correctCount">0</div></div>
        <div class="stat-item"><div class="stat-label">Incorrect</div><div class="stat-value warning" id="incorrectCount">0</div></div>
        <div class="stat-item"><div class="stat-label">Shapes</div><div class="stat-value" id="shapeCount">2</div></div>
        <div class="stat-item"><div class="stat-label">Problems</div><div class="stat-value" id="problemCount">0</div></div>
    </div>

    <div class="timer-container">
        <div class="timer-block">
            <span class="timer-label">Time Remaining</span>
            <span class="timer-display" id="timer">03:00</span>
        </div>
        <div class="timer-block">
            <span class="timer-label">Difficulty</span>
            <span id="difficultyBadge" class="difficulty-badge">Easy - 2 shapes</span>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-wrapper">
            <div class="grid-label">Left Grid</div>
            <div class="grid" id="leftGrid"></div>
        </div>
        <div class="grid-wrapper">
            <div class="grid-label">Right Grid</div>
            <div class="grid" id="rightGrid"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-same" id="sameBtn">Same</button>
        <button class="btn-different" id="differentBtn">Different</button>
        <button class="btn-reset" id="resetBtn">Reset Game</button>
    </div>
    <div class="message-area" id="message"></div>
</div>

<script>
    class FeatureSearchTraining {
        constructor() {
            this.score = 0;
            this.correctCount = 0;
            this.incorrectCount = 0;
            this.problemCount = 0;
            this.shapeCount = 2;
            this.timeLeft = 180;
            this.gameActive = false;
            this.timerInterval = null;
            this.waitingForNext = false;
            this.leftGrid = [];
            this.rightGrid = [];
            this.areIdentical = true;
            this.gridSize = 4;
            this.shapes = ['circle', 'square', 'triangle'];
            this.colors = ['#4299e1', '#f56565', '#48bb78', '#ecc94b', '#9f7aea', '#ed64a6'];
            this.completed = false;
            
            this.init();
        }
        
        init() {
            this.setupEventListeners();
            this.resetGame();
        }
        
        setupEventListeners() {
            document.getElementById('sameBtn').addEventListener('click', () => this.handleResponse('same'));
            document.getElementById('differentBtn').addEventListener('click', () => this.handleResponse('different'));
            document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
        }
        
        resetGame() {
            if (this.timerInterval) clearInterval(this.timerInterval);
            this.gameActive = true;
            this.waitingForNext = false;
            this.completed = false;
            this.score = 0;
            this.correctCount = 0;
            this.incorrectCount = 0;
            this.problemCount = 0;
            this.shapeCount = 2;
            this.timeLeft = 180;
            this.updateStats();
            this.updateDifficultyDisplay();
            this.updateTimerDisplay();
            this.startTimer();
            this.generateProblem();
            document.getElementById('sameBtn').disabled = false;
            document.getElementById('differentBtn').disabled = false;
            this.showMessage('Game started! Compare the grids.', 'info');
        }
        
        startTimer() {
            this.timerInterval = setInterval(() => {
                if (!this.gameActive) return;
                this.timeLeft--;
                this.updateTimerDisplay();
                if (this.timeLeft <= 0) {
                    this.timeUp();
                }
            }, 1000);
        }
        
        updateTimerDisplay() {
            const minutes = Math.floor(this.timeLeft / 60);
            const seconds = this.timeLeft % 60;
            document.getElementById('timer').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (this.timeLeft <= 30) {
                document.getElementById('timer').style.color = '#f56565';
            } else {
                document.getElementById('timer').style.color = 'white';
            }
        }
        
        timeUp() {
            this.gameActive = false;
            clearInterval(this.timerInterval);
            document.getElementById('sameBtn').disabled = true;
            document.getElementById('differentBtn').disabled = true;
            this.showMessage(`Time's up! Final score: ${this.score}`, 'info');
            this.completeTraining();
        }
        
        generateProblem() {
            if (!this.gameActive) return;
            this.waitingForNext = false;
            
            this.leftGrid = Array(this.gridSize).fill().map(() => Array(this.gridSize).fill(null));
            this.rightGrid = Array(this.gridSize).fill().map(() => Array(this.gridSize).fill(null));
            
            const positions = this.generateRandomPositions(this.shapeCount);
            positions.forEach((pos) => {
                this.leftGrid[pos.row][pos.col] = this.generateRandomShape();
            });
            
            this.areIdentical = Math.random() < 0.5;
            
            if (this.areIdentical) {
                this.rightGrid = JSON.parse(JSON.stringify(this.leftGrid));
            } else {
                this.rightGrid = JSON.parse(JSON.stringify(this.leftGrid));
                this.modifyOneShape();
            }
            
            this.renderGrids();
        }
        
        generateRandomPositions(count) {
            const positions = [];
            const totalCells = this.gridSize * this.gridSize;
            while (positions.length < count) {
                const randomIndex = Math.floor(Math.random() * totalCells);
                const row = Math.floor(randomIndex / this.gridSize);
                const col = randomIndex % this.gridSize;
                if (!positions.some(p => p.row === row && p.col === col)) {
                    positions.push({ row, col });
                }
            }
            return positions;
        }
        
        generateRandomShape() {
            return {
                type: this.shapes[Math.floor(Math.random() * this.shapes.length)],
                color: this.colors[Math.floor(Math.random() * this.colors.length)]
            };
        }
        
        modifyOneShape() {
            const shapeCells = [];
            for (let i = 0; i < this.gridSize; i++) {
                for (let j = 0; j < this.gridSize; j++) {
                    if (this.leftGrid[i][j] !== null) {
                        shapeCells.push({ row: i, col: j });
                    }
                }
            }
            if (shapeCells.length > 0) {
                const target = shapeCells[Math.floor(Math.random() * shapeCells.length)];
                this.rightGrid[target.row][target.col] = this.generateRandomShape();
            }
        }
        
        renderGrids() {
            this.renderSingleGrid('leftGrid', this.leftGrid);
            this.renderSingleGrid('rightGrid', this.rightGrid);
        }
        
        renderSingleGrid(containerId, grid) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < this.gridSize; i++) {
                for (let j = 0; j < this.gridSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    const shapeData = grid[i][j];
                    if (shapeData) {
                        const shapeEl = document.createElement('div');
                        shapeEl.className = `shape shape-${shapeData.type}`;
                        if (shapeData.type === 'triangle') {
                            shapeEl.style.borderBottomColor = shapeData.color;
                        } else {
                            shapeEl.style.backgroundColor = shapeData.color;
                        }
                        cell.appendChild(shapeEl);
                    }
                    container.appendChild(cell);
                }
            }
        }
        
        handleResponse(response) {
            if (!this.gameActive || this.waitingForNext) return;
            
            const isCorrect = (response === 'same' && this.areIdentical) || 
                            (response === 'different' && !this.areIdentical);
            
            this.waitingForNext = true;
            document.getElementById('sameBtn').disabled = true;
            document.getElementById('differentBtn').disabled = true;
            
            if (isCorrect) {
                this.correctCount++;
                this.score += this.shapeCount;
                this.showMessage('✓ Correct!', 'success');
                if (this.shapeCount < 8) this.shapeCount++;
            } else {
                this.incorrectCount++;
                this.score -= this.shapeCount;
                this.showMessage('✗ Incorrect!', 'error');
                if (this.shapeCount > 2) this.shapeCount--;
            }
            
            this.problemCount++;
            this.updateStats();
            this.updateDifficultyDisplay();
            
            setTimeout(() => {
                if (this.gameActive) {
                    this.generateProblem();
                    document.getElementById('sameBtn').disabled = false;
                    document.getElementById('differentBtn').disabled = false;
                }
            }, 1200);
        }
        
        updateStats() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('correctCount').textContent = this.correctCount;
            document.getElementById('incorrectCount').textContent = this.incorrectCount;
            document.getElementById('shapeCount').textContent = this.shapeCount;
            document.getElementById('problemCount').textContent = this.problemCount;
        }
        
        updateDifficultyDisplay() {
            const badge = document.getElementById('difficultyBadge');
            if (this.shapeCount <= 3) {
                badge.className = 'difficulty-badge';
                badge.classList.add('difficulty-easy');
                badge.textContent = `Easy - ${this.shapeCount} shapes`;
            } else if (this.shapeCount <= 5) {
                badge.className = 'difficulty-badge';
                badge.classList.add('difficulty-medium');
                badge.textContent = `Medium - ${this.shapeCount} shapes`;
            } else {
                badge.className = 'difficulty-badge';
                badge.classList.add('difficulty-hard');
                badge.textContent = `Hard - ${this.shapeCount} shapes`;
            }
        }
        
        showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message-area message-${type}`;
            setTimeout(() => {
                if (document.getElementById('message').textContent === text) {
                    msgDiv.textContent = '';
                    msgDiv.className = 'message-area';
                }
            }, 1500);
        }
        
        completeTraining() {
            if (this.completed) return;
            this.completed = true;
            
            // Show completion banner
            const banner = document.createElement('div');
            banner.className = 'completion-banner';
            banner.innerHTML = '✅ Task Completed! You can close this window.';
            document.body.appendChild(banner);
            
            // Notify parent window
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('taskId');
            if (window.opener) {
                window.opener.postMessage({ type: 'TASK_COMPLETE', taskId: taskId }, '*');
            }
            
            setTimeout(() => banner.remove(), 5000);
        }
    }
    
    const game = new FeatureSearchTraining();
</script>
</body>
</html>
