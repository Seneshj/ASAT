<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match - Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
        }
        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 24px 28px 36px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 800px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
        }
        .title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9e084, #ffc857);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats-panel {
            display: flex;
            gap: 20px;
            background: #0f2a36;
            padding: 12px 25px;
            border-radius: 60px;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fbe9c3;
            font-weight: 600;
        }
        .stat span {
            background: #1f4b5e;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #fee7a0;
            font-size: 1.5rem;
        }
        .round-info {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .grid-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .card {
            aspect-ratio: 1;
            cursor: pointer;
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
        }
        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
        }
        .card-back {
            background: repeating-radial-gradient(circle at 20% 30%, #3f7e93, #1f5569 15px);
            border: 3px solid #fbd26a;
            transform: rotateY(0deg);
        }
        .card-back::after {
            content: "?";
            font-size: 2.5rem;
            font-weight: 800;
            color: rgba(255,255,200,0.9);
        }
        .card-front {
            transform: rotateY(180deg);
            background: #fffef7;
            border: 3px solid #ffcf8a;
        }
        .card.matched .card-front {
            box-shadow: 0 0 0 4px #a5e6a5;
        }
        .message {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 20px;
            background: #0e2d3b;
            padding: 12px;
            border-radius: 60px;
            color: #ffeaa5;
        }
        .completion-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 550px) {
            .grid-board { gap: 10px; }
            .card-front, .card-back { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">🎴 Memory Match</div>
        <div class="stats-panel">
            <div class="stat">Moves <span id="movesDisplay">0</span></div>
            <div class="stat">Round <span id="roundDisplay">1</span>/3</div>
        </div>
    </div>
    
    <div class="round-info" id="roundInfo">🎯 Round 1 of 3</div>
    
    <div id="memoryGrid" class="grid-board"></div>
    
    <div id="message" class="message">✨ Click cards to find matching pairs ✨</div>
</div>

<script>
    (function() {
        const ICONS = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        const TOTAL_PAIRS = 8;
        const TOTAL_CARDS = 16;
        const TOTAL_ROUNDS = 3;
        
        let currentRound = 1;
        let cards = [];
        let cardElements = [];
        let flippedIndexes = [];
        let lockBoard = false;
        let moves = 0;
        let matchedPairs = 0;
        let timeoutHandle = null;
        let roundCompleted = false;
        let completed = false;
        
        const gridElement = document.getElementById('memoryGrid');
        const movesSpan = document.getElementById('movesDisplay');
        const roundDisplay = document.getElementById('roundDisplay');
        const roundInfo = document.getElementById('roundInfo');
        const messageDiv = document.getElementById('message');
        
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function createShuffledCards() {
            let deck = [];
            for (let i = 0; i < TOTAL_PAIRS; i++) {
                const icon = ICONS[i % ICONS.length];
                deck.push({ id: i * 2, icon: icon, matched: false, element: null });
                deck.push({ id: i * 2 + 1, icon: icon, matched: false, element: null });
            }
            return shuffleArray(deck);
        }
        
        function buildGrid() {
            gridElement.innerHTML = '';
            cardElements = [];
            cards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${card.matched ? 'matched' : ''}`;
                cardDiv.dataset.index = index;
                
                const innerDiv = document.createElement('div');
                innerDiv.className = 'card-inner';
                
                const frontDiv = document.createElement('div');
                frontDiv.className = 'card-front';
                frontDiv.textContent = card.icon;
                
                const backDiv = document.createElement('div');
                backDiv.className = 'card-back';
                
                innerDiv.appendChild(frontDiv);
                innerDiv.appendChild(backDiv);
                cardDiv.appendChild(innerDiv);
                
                cardDiv.addEventListener('click', () => onCardClick(index));
                gridElement.appendChild(cardDiv);
                card.element = cardDiv;
                cardElements[index] = cardDiv;
            });
        }
        
        function syncFlippedClasses() {
            cards.forEach((card, idx) => {
                const el = card.element;
                if (!el) return;
                if (card.matched) {
                    el.classList.add('flipped', 'matched');
                } else {
                    el.classList.remove('flipped', 'matched');
                }
            });
            flippedIndexes = [];
        }
        
        function updateStats() {
            movesSpan.textContent = moves;
            roundDisplay.textContent = `${currentRound}/${TOTAL_ROUNDS}`;
            roundInfo.innerHTML = `🎯 Round ${currentRound} of ${TOTAL_ROUNDS} | Matches: ${matchedPairs}/${TOTAL_PAIRS}`;
        }
        
        function checkRoundComplete() {
            if (matchedPairs === TOTAL_PAIRS) {
                if (currentRound < TOTAL_ROUNDS) {
                    messageDiv.innerHTML = `🎉 Round ${currentRound} Complete! Starting Round ${currentRound + 1}... 🎉`;
                    messageDiv.style.background = '#6a994e';
                    setTimeout(() => {
                        currentRound++;
                        resetRound();
                    }, 2000);
                } else {
                    messageDiv.innerHTML = `🏆 CONGRATULATIONS! You completed all ${TOTAL_ROUNDS} rounds! 🏆`;
                    messageDiv.style.background = '#6a994e';
                    completeTraining();
                }
            }
        }
        
        function resetRound() {
            cards = createShuffledCards();
            moves = 0;
            matchedPairs = 0;
            flippedIndexes = [];
            lockBoard = false;
            roundCompleted = false;
            if (timeoutHandle) clearTimeout(timeoutHandle);
            buildGrid();
            syncFlippedClasses();
            updateStats();
            messageDiv.innerHTML = `✨ Round ${currentRound} - Find all matching pairs! ✨`;
            messageDiv.style.background = '#0e2d3b';
        }
        
        function onCardClick(index) {
            if (lockBoard) return;
            const card = cards[index];
            if (card.matched) return;
            if (flippedIndexes.includes(index)) return;
            if (flippedIndexes.length >= 2) return;
            
            card.element.classList.add('flipped');
            flippedIndexes.push(index);
            
            if (flippedIndexes.length === 2) {
                moves++;
                updateStats();
                
                const idx1 = flippedIndexes[0];
                const idx2 = flippedIndexes[1];
                const card1 = cards[idx1];
                const card2 = cards[idx2];
                
                if (card1.icon === card2.icon) {
                    card1.matched = true;
                    card2.matched = true;
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchedPairs++;
                    flippedIndexes = [];
                    lockBoard = false;
                    updateStats();
                    checkRoundComplete();
                } else {
                    lockBoard = true;
                    if (timeoutHandle) clearTimeout(timeoutHandle);
                    timeoutHandle = setTimeout(() => {
                        cards.forEach((c, i) => {
                            if (!c.matched && flippedIndexes.includes(i)) {
                                c.element.classList.remove('flipped');
                            }
                        });
                        flippedIndexes = [];
                        lockBoard = false;
                        timeoutHandle = null;
                    }, 700);
                }
            }
            updateStats();
        }
        
        function completeTraining() {
            if (completed) return;
            completed = true;
            
            const banner = document.createElement('div');
            banner.className = 'completion-banner';
            banner.innerHTML = '✅ Memory Match Completed! You can close this window.';
            document.body.appendChild(banner);
            
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('taskId');
            if (window.opener) {
                window.opener.postMessage({ type: 'TASK_COMPLETE', taskId: taskId }, '*');
            }
            setTimeout(() => banner.remove(), 5000);
        }
        
        resetRound();
    })();
</script>
</body>
</html>
