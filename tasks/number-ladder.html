<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Ladder - Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #1a472a, #0d2818);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .game-container {
            background: rgba(255,255,255,0.95);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #1a472a;
            margin-bottom: 10px;
        }
        .current-number {
            font-size: 8rem;
            font-weight: bold;
            color: #2ecc71;
            margin: 30px 0;
            padding: 30px;
            background: #f0f0f0;
            border-radius: 30px;
            font-family: monospace;
        }
        .target-info {
            font-size: 1.5rem;
            margin: 20px 0;
        }
        .next-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e74c3c;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            padding: 15px;
            border-radius: 20px;
            flex: 1;
            margin: 0 5px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .number-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .num-btn {
            background: #3498db;
            border: none;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
        }
        .num-btn:active { transform: scale(0.95); }
        .timer {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            margin: 10px 0;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .completion-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🔢 Number Ladder</h1>
    <p>Press the next number in sequence!</p>
    
    <div class="current-number" id="currentNumber">1</div>
    
    <div class="target-info">
        Next: <span class="next-number" id="nextNumber">2</span>
    </div>
    
    <div class="timer" id="timer">90s</div>
    
    <div class="stats">
        <div class="stat-card">
            <div>Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-card">
            <div>Highest</div>
            <div class="stat-value" id="highest">0</div>
        </div>
    </div>
    
    <div class="number-buttons" id="numberButtons"></div>
    
    <div class="message" id="message">Game starting soon...</div>
</div>

<script>
    class NumberLadder {
        constructor() {
            this.currentNumber = 1;
            this.score = 0;
            this.highest = 0;
            this.timeLeft = 90;
            this.gameActive = false;
            this.timerInterval = null;
            this.completed = false;
            
            this.init();
        }
        
        init() {
            this.createButtons();
            this.setupEventListeners();
            this.startGame();
        }
        
        createButtons() {
            const container = document.getElementById('numberButtons');
            container.innerHTML = '';
            for (let i = 0; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => this.checkNumber(i));
                container.appendChild(btn);
            }
        }
        
        setupEventListeners() {
            window.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9') {
                    this.checkNumber(parseInt(e.key));
                }
            });
        }
        
        startGame() {
            this.gameActive = true;
            this.currentNumber = 1;
            this.score = 0;
            this.timeLeft = 90;
            this.updateDisplay();
            this.startTimer();
            document.getElementById('message').innerHTML = '🎯 Game started! Press the next number!';
            document.getElementById('message').style.background = '#d4edda';
        }
        
        startTimer() {
            this.timerInterval = setInterval(() => {
                if (!this.gameActive) return;
                this.timeLeft--;
                document.getElementById('timer').textContent = `${this.timeLeft}s`;
                
                if (this.timeLeft <= 0) {
                    this.endGame();
                }
            }, 1000);
        }
        
        checkNumber(num) {
            if (!this.gameActive) return;
            
            if (num === this.currentNumber) {
                // Correct!
                this.score++;
                if (this.score > this.highest) this.highest = this.score;
                this.currentNumber++;
                
                // Reset current number display
                document.getElementById('currentNumber').textContent = this.currentNumber - 1;
                document.getElementById('nextNumber').textContent = this.currentNumber;
                this.updateDisplay();
                
                // Visual feedback
                document.getElementById('currentNumber').style.transform = 'scale(1.1)';
                setTimeout(() => {
                    document.getElementById('currentNumber').style.transform = 'scale(1)';
                }, 200);
                
                document.getElementById('message').innerHTML = '✓ Correct! Keep going!';
                document.getElementById('message').style.background = '#d4edda';
                setTimeout(() => {
                    if (this.gameActive) {
                        document.getElementById('message').innerHTML = '🎯 Keep pressing the next number!';
                    }
                }, 800);
            } else {
                // Wrong number
                document.getElementById('message').innerHTML = `❌ Wrong! You pressed ${num}, needed ${this.currentNumber}`;
                document.getElementById('message').style.background = '#f8d7da';
                document.getElementById('message').style.color = '#721c24';
                
                // Visual feedback
                const wrongBtn = document.querySelectorAll('.num-btn')[num];
                wrongBtn.style.transform = 'scale(0.95)';
                wrongBtn.style.background = '#e74c3c';
                setTimeout(() => {
                    wrongBtn.style.transform = 'scale(1)';
                    wrongBtn.style.background = '#3498db';
                }, 300);
            }
        }
        
        updateDisplay() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('highest').textContent = this.highest;
        }
        
        endGame() {
            if (this.completed) return;
            this.gameActive = false;
            clearInterval(this.timerInterval);
            
            document.getElementById('message').innerHTML = `⏰ Time's up! Final score: ${this.score} | Highest: ${this.highest}`;
            document.getElementById('message').style.background = '#ffeaa7';
            document.getElementById('message').style.color = '#383d41';
            
            this.completeTraining();
        }
        
        completeTraining() {
            if (this.completed) return;
            this.completed = true;
            
            const banner = document.createElement('div');
            banner.className = 'completion-banner';
            banner.innerHTML = '✅ Number Ladder Completed! You can close this window.';
            document.body.appendChild(banner);
            
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('taskId');
            if (window.opener) {
                window.opener.postMessage({ type: 'TASK_COMPLETE', taskId: taskId }, '*');
            }
            setTimeout(() => banner.remove(), 5000);
        }
    }
    
    new NumberLadder();
</script>
</body>
</html>
