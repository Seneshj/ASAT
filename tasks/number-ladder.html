<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Ladder - Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 1000px;
            width: 95%;
            text-align: center;
        }
        h1 { text-align: center; color: #333; margin-top: 0; font-size: 28px; margin-bottom: 20px; }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #f5f5f5;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-item { text-align: center; flex: 1; min-width: 100px; }
        .stat-label { font-size: 14px; color: #666; }
        .stat-value { font-size: 28px; font-weight: bold; color: #333; }
        .game-area {
            position: relative;
            background: #f0f0f0;
            border-radius: 15px;
            min-height: 500px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            overflow: hidden;
        }
        .square {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .square.blank {
            background: #ff9800;
        }
        .square.clicked {
            opacity: 0.5;
            pointer-events: none;
            transform: scale(0.95);
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #5a3780; transform: translateY(-2px); }
        button:disabled { background: #cccccc; cursor: not-allowed; transform: none; }
        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .message.info { background: #d1ecf1; color: #0c5460; }
        .completion-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 700px) {
            .square { width: 60px; height: 60px; font-size: 18px; }
            .game-area { min-height: 450px; }
            .stat-value { font-size: 22px; }
            h1 { font-size: 22px; }
        }
        @media (max-width: 500px) {
            .square { width: 50px; height: 50px; font-size: 16px; }
            .game-area { min-height: 400px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🔢 Number Ladder</h1>
    
    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-label">Current Level</div>
            <div class="stat-value" id="currentLevel">3</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Errors</div>
            <div class="stat-value" id="errorCount">0/3</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Max Level</div>
            <div class="stat-value" id="maxLevel">0</div>
        </div>
    </div>

    <div class="game-area" id="gameArea"></div>

    <div class="controls">
        <button id="nextLevelBtn" disabled>Next Level →</button>
        <button id="resetBtn">Reset Game</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
    class NumberLadder {
        constructor() {
            this.currentLevel = 3;
            this.errorCount = 0;
            this.maxLevelCompleted = 0;
            this.gameActive = true;
            this.numbers = [];
            this.clickedNumbers = [];
            this.timer = null;
            this.showNumbers = true;
            this.completedCurrentLevel = false;
            this.completed = false;
            
            this.gameArea = document.getElementById('gameArea');
            this.currentLevelEl = document.getElementById('currentLevel');
            this.errorCountEl = document.getElementById('errorCount');
            this.maxLevelEl = document.getElementById('maxLevel');
            this.messageEl = document.getElementById('message');
            this.nextLevelBtn = document.getElementById('nextLevelBtn');
            
            // Ensure game area has proper dimensions
            this.gameArea.style.minHeight = '500px';
            window.addEventListener('resize', () => this.adjustSquarePositions());
            
            this.init();
        }
        
        adjustSquarePositions() {
            if (!this.numbers.length) return;
            const areaWidth = this.gameArea.clientWidth - 100;
            const areaHeight = this.gameArea.clientHeight - 100;
            
            this.numbers.forEach((item, idx) => {
                if (!item.element.style.left || item.element.style.left === '') return;
                // Recalculate positions within bounds
                let left = Math.min(parseFloat(item.element.style.left), Math.max(areaWidth - 80, 20));
                let top = Math.min(parseFloat(item.element.style.top), Math.max(areaHeight - 80, 20));
                left = Math.max(left, 20);
                top = Math.max(top, 20);
                item.element.style.left = left + 'px';
                item.element.style.top = top + 'px';
            });
        }
        
        init() {
            this.clearMessage();
            this.generateSquares();
            this.showNumbers = true;
            if (this.timer) clearTimeout(this.timer);
            this.timer = setTimeout(() => {
                this.hideNumbers();
            }, 2000);
        }
        
        generateSquares() {
            this.gameArea.innerHTML = '';
            this.numbers = [];
            this.clickedNumbers = [];
            this.completedCurrentLevel = false;
            this.nextLevelBtn.disabled = true;
            
            const areaWidth = this.gameArea.clientWidth - 120;
            const areaHeight = this.gameArea.clientHeight - 120;
            
            // Use grid-based positioning to prevent overlap
            const gridSize = Math.ceil(Math.sqrt(this.currentLevel)) + 1;
            const cellWidth = areaWidth / gridSize;
            const cellHeight = areaHeight / gridSize;
            
            const usedPositions = [];
            
            for (let i = 1; i <= this.currentLevel; i++) {
                const square = document.createElement('div');
                square.className = 'square';
                square.textContent = i;
                square.dataset.number = i;
                
                // Find non-overlapping position
                let attempts = 0;
                let left, top, valid;
                do {
                    valid = true;
                    const col = Math.floor(Math.random() * gridSize);
                    const row = Math.floor(Math.random() * gridSize);
                    left = 20 + (col * cellWidth) + (Math.random() * (cellWidth - 80));
                    top = 20 + (row * cellHeight) + (Math.random() * (cellHeight - 80));
                    
                    left = Math.min(left, areaWidth - 70);
                    top = Math.min(top, areaHeight - 70);
                    left = Math.max(left, 20);
                    top = Math.max(top, 20);
                    
                    // Check overlap with existing squares
                    for (let pos of usedPositions) {
                        if (Math.abs(pos.left - left) < 85 && Math.abs(pos.top - top) < 85) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                    if (attempts > 50) break;
                } while (!valid);
                
                usedPositions.push({ left, top });
                square.style.left = left + 'px';
                square.style.top = top + 'px';
                
                square.addEventListener('click', () => this.handleSquareClick(i));
                this.gameArea.appendChild(square);
                this.numbers.push({ element: square, number: i, clicked: false });
            }
        }
        
        hideNumbers() {
            this.showNumbers = false;
            this.numbers.forEach(item => {
                item.element.classList.add('blank');
                item.element.textContent = '';
            });
        }
        
        handleSquareClick(number) {
            if (!this.gameActive || this.showNumbers || this.completedCurrentLevel) return;
            
            const expectedNumber = this.clickedNumbers.length + 1;
            
            if (number === expectedNumber) {
                const square = this.numbers.find(item => item.number === number).element;
                square.classList.add('clicked');
                this.clickedNumbers.push(number);
                
                if (this.clickedNumbers.length === this.currentLevel) {
                    this.completeLevel();
                }
            } else {
                this.errorCount++;
                this.updateStats();
                
                if (this.errorCount >= 3) {
                    this.gameOver();
                } else {
                    this.showMessage(`❌ Wrong! You clicked ${number}, needed ${expectedNumber}`, 'error');
                    this.resetLevel();
                }
            }
        }
        
        completeLevel() {
            this.completedCurrentLevel = true;
            this.nextLevelBtn.disabled = false;
            
            if (this.currentLevel > this.maxLevelCompleted) {
                this.maxLevelCompleted = this.currentLevel;
            }
            
            this.showMessage(`🎉 Level ${this.currentLevel} Complete! Click Next Level`, 'success');
            this.updateStats();
        }
        
        resetLevel() {
            this.showNumbers = true;
            this.clickedNumbers = [];
            this.completedCurrentLevel = false;
            this.nextLevelBtn.disabled = true;
            
            this.generateSquares();
            
            if (this.timer) clearTimeout(this.timer);
            this.timer = setTimeout(() => {
                this.hideNumbers();
            }, 2000);
        }
        
        nextLevel() {
            this.showNumbers = true;
            this.clickedNumbers = [];
            this.completedCurrentLevel = false;
            this.nextLevelBtn.disabled = true;
            this.currentLevel++;
            
            this.generateSquares();
            
            if (this.timer) clearTimeout(this.timer);
            this.timer = setTimeout(() => {
                this.hideNumbers();
            }, 2000);
            
            this.updateStats();
        }
        
        gameOver() {
            this.gameActive = false;
            this.nextLevelBtn.disabled = true;
            this.showMessage('❌ Game Over! Too many errors. Press Reset to play again.', 'error');
            this.numbers.forEach(item => {
                item.element.style.pointerEvents = 'none';
            });
        }
        
        showMessage(text, type) {
            this.messageEl.textContent = text;
            this.messageEl.className = `message ${type}`;
            setTimeout(() => {
                if (this.messageEl.textContent === text) {
                    this.clearMessage();
                }
            }, 2000);
        }
        
        clearMessage() {
            this.messageEl.textContent = '';
            this.messageEl.className = 'message';
        }
        
        updateStats() {
            this.currentLevelEl.textContent = this.currentLevel;
            this.errorCountEl.textContent = `${this.errorCount}/3`;
            this.maxLevelEl.textContent = this.maxLevelCompleted;
        }
        
        reset() {
            this.currentLevel = 3;
            this.errorCount = 0;
            this.maxLevelCompleted = 0;
            this.gameActive = true;
            this.clickedNumbers = [];
            this.completedCurrentLevel = false;
            this.completed = false;
            
            if (this.timer) clearTimeout(this.timer);
            this.updateStats();
            this.clearMessage();
            this.init();
        }
        
        completeTraining() {
            if (this.completed) return;
            this.completed = true;
            
            const banner = document.createElement('div');
            banner.className = 'completion-banner';
            banner.innerHTML = '✅ Number Ladder Completed! You can close this window.';
            document.body.appendChild(banner);
            
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('taskId');
            if (window.opener) {
                window.opener.postMessage({ type: 'TASK_COMPLETE', taskId: taskId }, '*');
            }
            setTimeout(() => banner.remove(), 5000);
        }
    }
    
    const game = new NumberLadder();
    
    document.getElementById('nextLevelBtn').addEventListener('click', () => {
        if (game.completedCurrentLevel) {
            if (game.currentLevel >= 10) {
                game.completeTraining();
            } else {
                game.nextLevel();
            }
        }
    });
    document.getElementById('resetBtn').addEventListener('click', () => game.reset());
</script>
</body>
</html>
